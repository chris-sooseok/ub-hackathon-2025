services:
  mongo:
    image: mongo:4.2.5
    restart: unless-stopped
    volumes:
      - mongodata:/data/db

  server:
    build:
      context: .
      dockerfile: server.Dockerfile
    env_file: ./.env
    container_name: server
    depends_on:
      - mongo
    ports: # to expose port so frontend can request. can change after reverse proxy config
      - "5500:5500"
    volumes:
      - server_media:/app/media

  client:
    build:
      context: .
      dockerfile: client.Dockerfile
      args:
        VITE_API_URL: http://localhost:5500/api
    container_name: client
    restart: always
    depends_on:
      - server
    ports:
      - "8080:8080"

volumes:
  mongodata:
  server_media: