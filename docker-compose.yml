services:
  mongo:
    image: mongo:4.2.5

  server:
    build:
      context: .
      dockerfile: server.Dockerfile
    container_name: server
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DOCUMENT: vendme-db
      WAIT_HOSTS: mongo:27017
    ports: # to expose port so frontend can request. can change after reverse proxy config
      - "5500:5500"

  client:
    build:
      context: .
      dockerfile: client.Dockerfile
      args:
        VITE_API_URL: http://localhost:5500/api
    container_name: client
    restart: always
    depends_on:
      - server
    ports:
      - "8080:8080"