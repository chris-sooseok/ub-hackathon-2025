server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # proxy API to flask service in the docker network
  location /api/ {
    proxy_pass http://server:5500/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  #f allback so deep links work
  location / {
    try_files $uri /index.html;
  }
}
